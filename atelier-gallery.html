<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Atelier | Power Suit Identity</title>
  <meta name="description" content="Private atelier gallery for verified clients." />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f2ea;
      color: #1f1a17;
      text-align: center;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    h1 {
      margin: 20px 0 10px;
      font-size: 40px;
    }

    #status {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
      margin-top: 30px;
    }

    .shot {
      background: #ffffff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
    }

    .shot img {
      display: block;
      width: 100%;
      height: auto;
    }

    .hidden {
      display: none;
    }

    footer {
      margin-top: 40px;
      opacity: 0.7;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Private Atelier</h1>
    <p id="status">Verifying access...</p>

    <div id="gallery" class="hidden" aria-hidden="true"></div>

    <footer>
      © <span id="year"></span> Power Suit Identity
    </footer>
  </div>

  <script src="atelier-gallery.js" defer></script>
</body>
</html>
